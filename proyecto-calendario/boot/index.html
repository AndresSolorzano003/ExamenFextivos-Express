<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calendario Pascual Bravo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-6">

    <div class="bg-slate-800 p-8 rounded-3xl shadow-2xl w-full max-w-md border border-slate-700">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-blue-400">Generador de Calendario</h1>
            <p class="text-slate-400 text-sm">Programación Avanzada - Pascual Bravo</p>
        </div>

        <div class="mb-8 p-4 bg-slate-700/50 rounded-2xl">
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Paso 1: Poblar Base de Datos</label>
            <div class="flex gap-2">
                <input type="number" id="anoGenerar" placeholder="Ej: 2023" value="2023" 
                       class="flex-1 bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500">
                <button onclick="generarAno()" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg font-bold transition">
                    Generar
                </button>
            </div>
        </div>

        <div class="p-4 bg-slate-700/50 rounded-2xl">
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Paso 2: Visualizar Resultados</label>
            <button onclick="listarCalendario()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-3 rounded-lg font-bold transition">
                Ver Calendario Clasificado
            </button>
        </div>

        <div id="status" class="mt-6 text-center text-sm font-medium hidden"></div>
    </div>

    <script>
        async function generarAno() {
            const ano = document.getElementById('anoGenerar').value;
            const status = document.getElementById('status');
            status.innerText = "⏳ Procesando 365 días...";
            status.className = "mt-6 text-center text-sm font-medium text-yellow-400";
            status.classList.remove('hidden');

            try {
                // Llama al endpoint de Spring Boot que pide el examen [cite: 536]
                const res = await fetch(`/api/calendario/generar/${ano}`);
                const data = await res.json();
                
                if(data === true) {
                    status.innerText = "✅ ¡Año generado y guardado en Postgres!";
                    status.className = "mt-6 text-center text-sm font-medium text-emerald-400";
                }
            } catch (e) {
                status.innerText = "❌ Error al conectar con el servidor";
                status.className = "mt-6 text-center text-sm font-medium text-red-400";
            }
        }

        function listarCalendario() {
            const ano = document.getElementById('anoGenerar').value;
            // Redirige al endpoint de listar para ver el JSON [cite: 564]
            window.location.href = `/api/calendario/listar/${ano}`;
        }
    </script>
</body>
</html>
